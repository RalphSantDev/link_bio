<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael Santana - Link in Bio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
</head>
<body>
    <div class="container">
        <!-- botão de alternar tema -->
        <button id="theme-toggle" aria-label="Alternar tema"><i class="fas fa-moon"></i></button>
        <!-- Foto de Perfil -->
        <div class="profile-section">
            <img src="assets/profile.jpeg" alt="Foto de Perfil" class="profile-pic">
            <h1 class="name">Raphael Santana</h1>
            <p class="description">Backend Developer em formação<br>Construindo consistência</p>
        </div>

        <!-- Ícones de Redes Sociais -->
        <div class="social-icons">
            <a href="https://www.instagram.com/raphaelsant.dev/" class="social-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://github.com/RalphSantDev" class="social-icon" title="GitHub"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/raphael-santanadev/" class="social-icon" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
        </div>

        <!-- Botões de Links -->
        <div class="links-section">
    
            <a href="https://www.instagram.com/raphaelsant.dev/" class="link-button">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
                <i class="fas fa-arrow-right"></i>
            </a>
            <a href="https://github.com/RalphSantDev" class="link-button">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
                <i class="fas fa-arrow-right"></i>
            </a>
            
            <a href="https://www.linkedin.com/in/raphael-santanadev/" class="link-button">
                <i class="fab fa-linkedin"></i>
                <span>LinkedIn</span>
                <i class="fas fa-arrow-right"></i>
            </a>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
